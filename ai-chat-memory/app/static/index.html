<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat with Memory</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; }
  .sidebar { width: 300px; background: #1a1a1a; border-right: 1px solid #2a2a2a; display: flex; flex-direction: column; }
  .sidebar h2 { padding: 20px; font-size: 16px; color: #888; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #2a2a2a; }
  .conv-list { flex: 1; overflow-y: auto; padding: 10px; }
  .conv-item { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; transition: background 0.2s; }
  .conv-item:hover { background: #252525; }
  .conv-item.active { background: #2a2a2a; border-left: 3px solid #4f8cff; }
  .conv-title { font-size: 14px; color: #e0e0e0; }
  .conv-meta { font-size: 11px; color: #666; margin-top: 4px; }
  .main { flex: 1; display: flex; flex-direction: column; }
  .header { padding: 16px 24px; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 18px; color: #e0e0e0; }
  .header span { font-size: 12px; color: #666; }
  .chat-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .msg { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; background: #4f8cff; color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: #252525; border: 1px solid #333; border-bottom-left-radius: 4px; }
  .msg.system { align-self: center; background: transparent; color: #666; font-size: 12px; border: none; }
  .msg .role-label { font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .input-area { padding: 16px 24px; border-top: 1px solid #2a2a2a; display: flex; gap: 12px; }
  .input-area input { flex: 1; padding: 12px 16px; border: 1px solid #333; border-radius: 8px; background: #1a1a1a; color: #e0e0e0; font-size: 14px; outline: none; transition: border 0.2s; }
  .input-area input:focus { border-color: #4f8cff; }
  .input-area input::placeholder { color: #555; }
  .input-area button { padding: 12px 24px; border: none; border-radius: 8px; background: #4f8cff; color: #fff; font-size: 14px; cursor: pointer; transition: background 0.2s; }
  .input-area button:hover { background: #3a7bef; }
  .input-area button:disabled { background: #333; cursor: not-allowed; }
  .typing { align-self: flex-start; padding: 12px 16px; background: #252525; border: 1px solid #333; border-radius: 12px; border-bottom-left-radius: 4px; display: none; }
  .typing span { display: inline-block; width: 8px; height: 8px; background: #666; border-radius: 50%; margin: 0 2px; animation: bounce 1.4s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); } 40% { transform: scale(1); } }
  .btn-sm { padding: 6px 14px; border: 1px solid #333; border-radius: 6px; background: transparent; color: #888; cursor: pointer; font-size: 12px; transition: all 0.2s; }
  .btn-sm:hover { border-color: #4f8cff; color: #4f8cff; }
  code { background: #1a1a1a; padding: 1px 4px; border-radius: 3px; font-size: 13px; }
  pre { background: #1a1a1a; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
  pre code { background: none; padding: 0; }
  a { color: #4f8cff; text-decoration: none; }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; gap: 12px; }
  .empty-state h3 { font-size: 20px; color: #666; }
  .empty-state p { font-size: 14px; }
  .memory-btn { margin-right: 12px; }
  .modal-overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; max-width: 500px; width: 90%; max-height: 80vh; display: flex; flex-direction: column; }
  .modal-header { padding: 16px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
  .modal-header h3 { margin: 0; color: #e0e0e0; font-size: 16px; }
  .modal-close { background: none; border: none; color: #666; font-size: 20px; cursor: pointer; padding: 0 4px; }
  .modal-close:hover { color: #e0e0e0; }
  .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; max-height: 60vh; }
</style>
</head>
<body>

<div class="sidebar">
  <h2>Percakapan</h2>
  <div style="padding: 0 10px 10px">
    <button class="btn-sm" onclick="newConversation()" style="width:100%">+ Baru</button>
  </div>
  <div class="conv-list" id="convList"></div>
  <div style="padding: 12px; border-top: 1px solid #2a2a2a; font-size: 11px; color: #555; text-align: center;">
    <button class="btn-sm memory-btn" onclick="showMemory()">Memory</button>
    User: <span id="userIdDisplay">user1</span>
  </div>
</div>

<div class="modal-overlay" id="memoryModal">
  <div class="modal">
    <div class="modal-header">
      <h3>🧠 Yang AI Ingat</h3>
      <button class="modal-close" onclick="closeMemory()">&times;</button>
    </div>
    <div class="modal-body" id="memoryBody"></div>
  </div>
</div>

<div class="main">
  <div class="header">
    <h1 id="convTitle">Percakapan Baru</h1>
    <span id="modelInfo">9Router</span>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <h3>💬 AI Chat dengan Memory</h3>
      <p>Ketik pesan untuk memulai percakapan</p>
    </div>
  </div>

  <div class="typing" id="typing">
    <span></span><span></span><span></span>
  </div>

  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Ketik pesan..." autofocus
      onkeydown="if(event.key==='Enter') sendMessage()">
    <button id="sendBtn" onclick="sendMessage()">Kirim</button>
  </div>
</div>

<script>
const API = window.location.origin;
let currentConv = null;
let userId = 'user1';

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  return res;
}

async function loadConversations() {
  const res = await api('GET', `/api/v1/conversations/${userId}`);
  const convs = await res.json();
  const list = document.getElementById('convList');
  list.innerHTML = '';
  convs.forEach(c => {
    const div = document.createElement('div');
    div.className = 'conv-item' + (c.id === currentConv ? ' active' : '');
    div.innerHTML = `<div class="conv-title">${c.title || 'Percakapan'}</div>
      <div class="conv-meta">${c.category || 'casual'} · ${c.message_count || 0} pesan</div>`;
    div.onclick = () => selectConversation(c.id);
    list.appendChild(div);
  });
}

async function selectConversation(convId) {
  currentConv = convId;
  const res = await api('GET', `/api/v1/conversations/${convId}/messages`);
  const msgs = await res.json();
  document.getElementById('chatArea').innerHTML = '';
  msgs.forEach(m => addMessage(m.role, m.content));
  document.getElementById('convTitle').textContent = 'Percakapan';
  loadConversations();
}

function addMessage(role, content) {
  const area = document.getElementById('chatArea');
  const es = document.getElementById('emptyState');
  if (es) es.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'system') {
    div.textContent = content;
  } else {
    div.innerHTML = `<div class="role-label">${role === 'user' ? 'Kamu' : 'AI'}</div>${formatContent(content)}`;
  }
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function formatContent(text) {
  text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\n/g, '<br>');
  return text;
}

function showTyping() {
  document.getElementById('typing').style.display = 'block';
}

function hideTyping() {
  document.getElementById('typing').style.display = 'none';
}

async function sendMessage() {
  const input = document.getElementById('messageInput');
  const btn = document.getElementById('sendBtn');
  const msg = input.value.trim();
  if (!msg) return;

  input.value = '';
  btn.disabled = true;

  if (!currentConv) {
    currentConv = 'conv_' + Date.now();
  }

  addMessage('user', msg);
  showTyping();

  try {
    const res = await fetch(API + '/api/v1/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, conversation_id: currentConv, message: msg })
    });

    hideTyping();
    const assistantDiv = addMessage('assistant', '');

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let responseText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      responseText += decoder.decode(value, { stream: true });
      assistantDiv.innerHTML = `<div class="role-label">AI</div>${formatContent(responseText)}`;
      document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
    }
    loadConversations();
  } catch (e) {
    hideTyping();
    addMessage('system', 'Error: gagal terhubung ke server');
  }
  btn.disabled = false;
  document.getElementById('messageInput').focus();
}

async function newConversation() {
  currentConv = null;
  const area = document.getElementById('chatArea');
  area.innerHTML = '<div class="empty-state" id="emptyState"><h3>💬 AI Chat dengan Memory</h3><p>Ketik pesan untuk memulai percakapan</p></div>';
  document.getElementById('convTitle').textContent = 'Percakapan Baru';
  loadConversations();
}

function closeMemory() {
  document.getElementById('memoryModal').classList.remove('show');
}

async function showMemory() {
  const res = await api('GET', `/api/v1/memory/${userId}`);
  const facts = await res.json();
  const body = document.getElementById('memoryBody');
  if (facts.length === 0) {
    body.innerHTML = '<p style="color:#666;text-align:center;padding:20px">Belum ada memori tersimpan</p>';
  } else {
    body.innerHTML = facts.map(f => `
      <div style="padding:10px;background:#252525;border-radius:8px;margin-bottom:8px;border-left:3px solid #4f8cff">
        <div style="color:#888;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">${f.type}</div>
        <div style="color:#e0e0e0"><strong>${escHtml(f.key)}:</strong> ${escHtml(f.value)}</div>
        <div style="color:#555;font-size:11px;margin-top:4px">confidence: ${f.confidence} · decay: ${f.decay_score.toFixed(2)}</div>
      </div>`).join('');
  }
  document.getElementById('memoryModal').classList.add('show');
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadConversations();
</script>
</body>
</html>
