<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/htmx.org@2.x.x/dist/htmx.min.js"></script>
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#252525;--border:#2a2a2a;--text:#e0e0e0;--text2:#888;--text3:#555;--accent:#4f8cff;--user-msg:#4f8cff;--green:#22c55e;--red:#ef4444;--amber:#f59e0b}
.light{--bg:#f5f5f5;--surface:#fff;--surface2:#eee;--border:#ddd;--text:#222;--text2:#666;--text3:#999;--accent:#2563eb;--user-msg:#2563eb}
*{margin:0;padding:0;box-sizing:border-box}
body{font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;transition:background .3s}

/* Sidebar */
.sidebar{width:300px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-h{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sb-h h2{font-size:14px;color:var(--text2)}
.sb-search{padding:8px 12px;border-bottom:1px solid var(--border)}
.sb-search input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);font-size:12px;outline:none;transition:border .2s}
.sb-search input:focus{border-color:var(--accent)}
.conv-list{flex:1;overflow-y:auto;padding:6px 8px}
.conv-item{padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:2px;transition:background .15s;position:relative;border-left:3px solid transparent}
.conv-item:hover{background:var(--surface2)}
.conv-item.active{background:var(--surface2);border-left-color:var(--accent)}
.conv-title{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:28px}
.conv-meta{font-size:11px;color:var(--text3);margin-top:2px}
.conv-del{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:1px 4px;border-radius:4px;display:none}
.conv-item:hover .conv-del{display:block}
.conv-del:hover{color:var(--red);background:rgba(239,68,68,.1)}
.sb-foot{padding:8px 12px;border-top:1px solid var(--border);display:flex;gap:4px;font-size:11px;color:var(--text3);align-items:center}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.header{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.header h1{font-size:15px;font-weight:600;color:var(--text);flex:1;min-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-actions{display:flex;gap:6px;align-items:center}
.btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;padding:5px 10px;font-size:12px;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.accent{background:var(--accent);color:#fff;border:none}
.btn.accent:hover{opacity:.9}
.btn.accent:disabled{background:var(--text3);cursor:not-allowed}
.btn.danger:hover{color:var(--red);border-color:var(--red)}
select.btn{padding:5px 6px;max-width:150px;font-size:11px}

/* Chat */
.chat-area{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:6px}
.empty-state h3{font-size:17px;color:var(--text2)}
.msg{max-width:82%;padding:10px 14px;border-radius:10px;line-height:1.5;font-size:13px;animation:fadeIn .25s ease;position:relative;word-wrap:break-word}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;background:var(--user-msg);color:#fff;border-bottom-right-radius:3px;cursor:pointer}
.msg.user:hover{opacity:.92}
.msg.ai{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:3px}
.msg.status{align-self:center;color:var(--text3);font-size:11px;background:none;border:none;padding:2px 0}
.msg .time{font-size:10px;color:var(--text3);margin-top:4px;opacity:.7}
.msg.user .time{color:rgba(255,255,255,.5)}
.msg-actions{position:absolute;top:-22px;right:0;display:none;gap:3px}
.msg.ai:hover .msg-actions,.msg.user:hover .msg-actions{display:flex}
.msg-actions button{background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--text2);cursor:pointer;padding:1px 5px;font-size:10px}
.msg-actions .up:hover{color:var(--green)}
.msg-actions .down:hover{color:var(--red)}
.typing{display:none;align-self:flex-start;padding:8px 12px}
.typing span{display:inline-block;width:6px;height:6px;background:var(--text3);border-radius:50%;margin:0 2px;animation:bounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(.5)}40%{transform:scale(1)}}
.input-area{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.input-area input{flex:1;padding:9px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:14px;outline:none;transition:border .15s}
.input-area input:focus{border-color:var(--accent)}

/* Markdown */
pre{background:var(--surface);padding:10px;border-radius:6px;overflow-x:auto;margin:6px 0;border:1px solid var(--border);font-size:12px}
code{background:var(--surface2);padding:1px 4px;border-radius:3px;font-size:12px}
pre code{background:none;padding:0}
details{opacity:.6;font-size:11px;margin:4px 0}
details summary{cursor:pointer;color:var(--text2);user-select:none}
details small{display:block;margin-top:4px;color:var(--text3);line-height:1.4}
.rate-limit-notice{color:var(--amber);padding:10px;background:rgba(245,158,11,.1);border-radius:8px;font-size:12px;line-height:1.4}

/* Modal */
.modal-overlay{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,.65);align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;max-width:520px;width:92%;max-height:80vh;display:flex;flex-direction:column}
.modal-h{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-h h3{font-size:15px;color:var(--text)}
.modal-close{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer}
.modal-body{padding:14px 16px;overflow-y:auto;flex:1}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:13px;color:var(--text);box-shadow:0 4px 12px rgba(0,0,0,.4);z-index:2000;animation:slideIn .3s ease;transition:opacity .2s}
@keyframes slideIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

@media(max-width:768px){.sidebar{width:260px;position:fixed;left:0;top:0;height:100vh;z-index:500;transform:translateX(0)}.msg{max-width:92%}}
</style>
</head>
<body x-data="app" x-init="init()" :class="theme">

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sb-h">
    <h2>Percakapan</h2>
    <div style="display:flex;gap:4px">
      <button class="btn" @click="newConv()" title="Baru">+</button>
      <button class="btn" @click="toggleTheme()">🌓</button>
    </div>
  </div>
  <div class="sb-search"><input placeholder="Cari..." x-model="search" @input="filterConvs()"></div>
  <div class="conv-list" id="convList" hx-get="" hx-trigger="load, every 30s" hx-swap="innerHTML">
    <!-- HTMX-populated -->
  </div>
  <div class="sb-foot">
    <button class="btn" @click="modal='memory';loadMemory()">🧠</button>
    <button class="btn" @click="modal='knowledge';loadKnowledge()">📚</button>
    <span style="margin-left:auto" x-text="'👤 '+displayName"></span>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="header">
    <h1 id="convTitle">Percakapan Baru</h1>
    <span id="modelBadge" style="font-size:10px;color:var(--green);background:var(--surface2);padding:2px 8px;border-radius:10px" x-text="'🤖 '+modelLabel"></span>
    <select class="btn" x-model="selectedModel" @change="updateModel()" id="modelSelect">
      <option value="">🆓 auto</option>
    </select>
    <div class="header-actions">
      <button class="btn" @click="exportChat()" x-show="convId">📥</button>
      <button class="btn danger" @click="cancelStream()" x-show="streaming" id="cancelBtn">⏹</button>
    </div>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState"><h3>💬 AI Chat</h3><p>Ketik pesan untuk memulai</p></div>
  </div>
  <div class="typing" id="typing" x-show="streaming"><span></span><span></span><span></span></div>
  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Ketik pesan..." autofocus
      @keydown.enter="sendMessage()" :disabled="streaming">
    <button class="btn accent" @click="sendMessage()" :disabled="streaming || !inputText" id="sendBtn">Kirim</button>
  </div>
</div>

<!-- Memory Modal -->
<div class="modal-overlay" :class="{show:modal==='memory'}" @click.self="modal=null">
  <div class="modal">
    <div class="modal-h"><h3>🧠 Yang AI Ingat</h3><button class="modal-close" @click="modal=null">&times;</button></div>
    <div class="modal-body" id="memoryBody" hx-get="" hx-trigger="revealed" hx-swap="innerHTML"></div>
  </div>
</div>

<!-- Knowledge Modal -->
<div class="modal-overlay" :class="{show:modal==='knowledge'}" @click.self="modal=null">
  <div class="modal">
    <div class="modal-h"><h3>📚 Knowledge Base</h3><button class="modal-close" @click="modal=null">&times;</button></div>
    <div class="modal-body" id="knowledgeBody" hx-get="" hx-trigger="revealed" hx-swap="innerHTML"></div>
  </div>
</div>

<!-- Welcome/Reminder Modal -->
<div class="modal-overlay" :class="{show:modal==='welcome'}" @click.self="modal=null">
  <div class="modal" style="max-width:400px">
    <div class="modal-h"><h3>☀️ Selamat Datang!</h3><button class="modal-close" @click="modal=null">&times;</button></div>
    <div class="modal-body" id="welcomeBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" x-show="toastMsg" x-text="toastMsg" x-transition style="display:none"></div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.data('app', () => ({
    API: window.location.origin,
    convId: null, userId: 'u1', displayName: 'u1',
    search: '', theme: 'dark', modelLabel: 'auto', selectedModel: '',
    streaming: false, modal: null, toastMsg: '',
    abortCtrl: null, streamAborted: false,
    inputText: '',  // bound to input via x-model

    init() {
      this.theme = localStorage.getItem('theme') || 'dark';
      this.loadConvs();
      this.loadModels();
      this.loadProfile();
      this.checkReminders();
    },

    // ── Theme ──
    toggleTheme() {
      this.theme = this.theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', this.theme);
    },

    // ── Toast ──
    toast(msg) { this.toastMsg = msg; setTimeout(() => this.toastMsg = '', 2500); },

    // ── API helper ──
    async api(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(this.API + path, opts);
      if (!res.ok) throw new Error(await res.text());
      return res;
    },

    // ── Conversations ──
    async loadConvs() {
      try {
        const res = await this.api('GET', `/api/v1/conversations/${this.userId}`);
        const convs = await res.json();
        let html = '';
        convs.forEach(c => {
          if (this.search && !(c.title || '').toLowerCase().includes(this.search.toLowerCase())) return;
          const title = c.title || 'Percakapan';
          html += `<div class="conv-item${c.id === this.convId ? ' active' : ''}"
            onclick="document.querySelector('[x-data]').__x.$data.selectConv('${c.id}')">
            <div class="conv-title">${this.esc(title)}</div>
            <div class="conv-meta">${c.category||'casual'} · ${c.message_count||0} psn</div>
            <button class="conv-del" onclick="event.stopPropagation();document.querySelector('[x-data]').__x.$data.deleteConv('${c.id}')">&times;</button>
          </div>`;
        });
        if (!html) html = '<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">Belum ada percakapan</div>';
        document.getElementById('convList').innerHTML = html;
      } catch(e) { console.error('loadConvs:', e); }
    },
    filterConvs() { this.loadConvs(); },
    newConv() {
      this.convId = null;
      document.getElementById('chatArea').innerHTML = '<div class="empty-state" id="emptyState"><h3>💬 AI Chat</h3><p>Ketik pesan untuk memulai</p></div>';
      document.getElementById('convTitle').textContent = 'Percakapan Baru';
      this.loadConvs();
    },
    async selectConv(id) {
      this.convId = id;
      document.getElementById('convTitle').textContent = 'Memuat...';
      try {
        const res = await this.api('GET', `/api/v1/conversations/${id}/messages`);
        const msgs = await res.json();
        document.getElementById('chatArea').innerHTML = '';
        msgs.forEach(m => this.addMsg(m.role, m.content, m.id, m.created_at, m.extra));
        document.getElementById('convTitle').textContent = 'Percakapan';
      } catch(e) { this.toast('Gagal memuat pesan'); }
      this.loadConvs();
    },
    async deleteConv(id) {
      if (!confirm('Hapus percakapan ini?')) return;
      try {
        await this.api('DELETE', `/api/v1/conversations/${id}`);
        if (this.convId === id) this.newConv();
        else this.loadConvs();
        this.toast('✅ Percakapan dihapus');
      } catch(e) { this.toast('Gagal menghapus'); }
    },

    // ── Messages ──
    addMsg(role, content, msgId, time, extra) {
      const area = document.getElementById('chatArea');
      const es = document.getElementById('emptyState');
      if (es) es.style.display = 'none';

      if (role === 'system' || role === 'status') {
        const div = document.createElement('div');
        div.className = 'msg status';
        div.textContent = content;
        area.appendChild(div);
        this.scroll();
        return div;
      }

      const div = document.createElement('div');
      const cls = role === 'user' ? 'user' : 'ai';
      div.className = 'msg ' + cls;

      let actions = '';
      if (role === 'assistant' && msgId) {
        actions = `<button class="up" onclick="document.querySelector('[x-data]').__x.$data.voteMsg('${msgId}','up',this)">👍</button>
                   <button class="down" onclick="document.querySelector('[x-data]').__x.$data.voteMsg('${msgId}','down',this)">👎</button>`;
      } else if (role === 'user' && msgId) {
        actions = `<button onclick="document.querySelector('[x-data]').__x.$data.editMsg('${msgId}','${this.esc(content)}')">✏️</button>`;
      }

      const label = role === 'user' ? 'Kamu' : 'AI';
      const timeHtml = time ? `<div class="time">${this.fmtTime(time)}</div>` : '';
      div.innerHTML = `<div class="msg-actions">${actions}</div>
        <div style="font-size:10px;color:var(--text2);margin-bottom:3px">${label}</div>
        ${this.fmtContent(content)}${timeHtml}`;

      if (role === 'user' && msgId) div.onclick = () => this.editMsg(msgId, content);
      area.appendChild(div);
      this.scroll();
      return div;
    },

    async voteMsg(msgId, vote, btn) {
      try {
        await this.api('POST', `/api/v1/messages/${msgId}/vote`, { vote });
        btn.textContent = vote === 'up' ? '👍🏽' : '👎🏽';
        this.toast('Terima kasih!');
      } catch(e) {}
    },

    async editMsg(msgId, oldContent) {
      const newContent = prompt('Edit pesan:', oldContent);
      if (!newContent || newContent === oldContent) return;
      try {
        await this.api('DELETE', `/api/v1/messages/${msgId}`);
        document.getElementById('chatArea').innerHTML = '';
        this.loadConvs();
        await this.sendMessageDirect(newContent);
      } catch(e) { this.toast('Gagal edit'); }
    },

    async exportChat() {
      if (!this.convId) { this.toast('Tidak ada percakapan'); return; }
      try {
        const res = await this.api('GET', `/api/v1/conversations/${this.convId}/export`);
        const data = await res.json();
        const blob = new Blob([data.text], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `chat-${this.convId.slice(0, 8)}.txt`;
        a.click();
        this.toast('📥 Chat di-export');
      } catch(e) { this.toast('Gagal export'); }
    },

    // ── Chat Streaming ──
    async sendMessage() {
      const input = document.getElementById('messageInput');
      const msg = input.value.trim();
      if (!msg || this.streaming) return;
      input.value = '';
      this.inputText = '';
      await this.sendMessageDirect(msg);
    },

    async sendMessageDirect(msg) {
      if (!this.convId) this.convId = 'conv_' + Date.now();
      this.streaming = true;
      this.streamAborted = false;

      this.addMsg('user', msg, null, new Date().toISOString());
      this.abortCtrl = new AbortController();

      try {
        const model = this.selectedModel || 'openrouter/free';
        const res = await fetch(this.API + '/api/v1/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: this.userId, conversation_id: this.convId, message: msg, model }),
          signal: this.abortCtrl.signal,
        });

        if (this.streamAborted) { this.streaming = false; return; }

        const assistantDiv = this.addMsg('assistant', '');
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let allText = '', rawAll = '', statusDiv = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          rawAll += decoder.decode(value, { stream: true });

          const parts = rawAll.split('__STATUS__:');
          let clean = '', status = '';
          for (let i = 0; i < parts.length; i++) {
            if (i === 0) { clean += parts[i]; continue; }
            const nl = parts[i].indexOf('\n');
            status = nl === -1 ? '' : parts[i].slice(0, nl);
            clean += nl === -1 ? parts[i] : parts[i].slice(nl + 1);
          }
          if (status && statusDiv) statusDiv.remove();
          if (status) statusDiv = this.addMsg('status', status);
          allText = clean;

          const strippedMatch = allText.match(/__STRIPPED__:([\s\S]+)$/);
          if (strippedMatch) {
            const answer = strippedMatch[1].trim();
            const reasoning = allText.replace(/__STRIPPED__:.+$/s, '').trim();
            if (reasoning && answer) {
              assistantDiv.innerHTML = `<div style="font-size:10px;color:var(--text2);margin-bottom:3px">AI</div>
                <details><summary>🤔 Proses berpikir</summary><small>${this.fmtContent(reasoning)}</small></details>
                ${this.fmtContent(answer)}`;
            } else {
              assistantDiv.innerHTML = `<div style="font-size:10px;color:var(--text2);margin-bottom:3px">AI</div>${this.fmtContent(answer || allText)}`;
            }
          } else {
            assistantDiv.innerHTML = `<div style="font-size:10px;color:var(--text2);margin-bottom:3px">AI</div>${this.fmtContent(allText)}`;
          }
          this.scroll();
        }

        if (statusDiv) statusDiv.remove();
        this.loadConvs();
        this.loadProfile();

      } catch(e) {
        if (e.name !== 'AbortError') {
          this.addMsg('status', 'Error: gagal terhubung ke server');
        }
      }
      this.streaming = false;
      document.getElementById('messageInput').focus();
    },

    cancelStream() {
      this.streamAborted = true;
      if (this.abortCtrl) this.abortCtrl.abort();
      this.streaming = false;
    },

    // ── Models ──
    async loadModels() {
      try {
        const res = await this.api('GET', '/api/v1/models');
        const data = await res.json();
        const sel = document.getElementById('modelSelect');
        sel.innerHTML = '<option value="">🆓 auto</option>';

        const cats = Object.keys(data.categorized || {}).sort();
        cats.forEach(cat => {
          const group = document.createElement('optgroup');
          group.label = cat;
          (data.categorized[cat] || []).forEach(m => {
            const opt = document.createElement('option');
            opt.value = m.id;
            const icon = m.free ? '✅' : '🔒';
            opt.textContent = icon + ' ' + (m.name || m.id);
            group.appendChild(opt);
          });
          sel.appendChild(group);
        });
        this.updateModel();
      } catch(e) { console.error('loadModels:', e); }
    },

    updateModel() {
      const m = this.selectedModel || 'auto';
      this.modelLabel = m === 'auto' ? 'auto' : m.replace(':free', '').replace('openrouter/', '');
    },

    // ── Memory Modal ──
    async loadMemory() {
      try {
        const res = await this.api('GET', `/api/v1/memory/${this.userId}`);
        const facts = await res.json();
        document.getElementById('memoryBody').innerHTML = facts.length === 0
          ? '<p style="color:var(--text3);text-align:center;padding:20px">Belum ada memori</p>'
          : facts.map(f => `<div style="padding:8px 10px;background:var(--surface2);border-radius:8px;margin-bottom:6px;border-left:3px solid var(--accent)">
            <div style="color:var(--text2);font-size:10px">${this.esc(f.type)}</div>
            <div style="color:var(--text)"><b>${this.esc(f.key)}:</b> ${this.esc(f.value)}</div>
            <div style="color:var(--text3);font-size:10px;margin-top:3px">decay: ${(f.decay_score||0).toFixed(2)}</div></div>`).join('');
      } catch(e) {}
    },

    // ── Knowledge Modal ──
    async loadKnowledge() {
      try {
        const [sr, lr] = await Promise.all([
          this.api('GET', `/api/v1/knowledge/${this.userId}/stats`),
          this.api('GET', `/api/v1/knowledge/${this.userId}?limit=100`)
        ]);
        const stats = await sr.json(), notes = await lr.json();
        let h = `<div style="display:flex;gap:12px;margin-bottom:10px">
          <div style="background:var(--surface2);padding:8px 12px;border-radius:8px;text-align:center;flex:1">
            <div style="font-size:18px;font-weight:bold;color:var(--accent)">${stats.total||0}</div>
            <div style="font-size:10px;color:var(--text3)">Catatan</div></div>
          <div style="background:var(--surface2);padding:8px 12px;border-radius:8px;text-align:center;flex:1">
            <div style="font-size:18px;font-weight:bold;color:var(--amber)">${stats.pinned||0}</div>
            <div style="font-size:10px;color:var(--text3)">Disematkan</div></div></div>`;
        const tags = stats.tags || {};
        for (const [t, n] of Object.entries(tags).slice(0, 6)) {
          h += `<span style="display:inline-block;background:var(--surface2);border-radius:10px;padding:2px 8px;font-size:10px;margin:2px;color:var(--accent)">#${t} ${n}</span>`;
        }
        h += `<div style="font-size:11px;color:var(--text2);margin:10px 0 6px;border-bottom:1px solid var(--border);padding-bottom:4px">Catatan</div>`;
        if (notes.length === 0) {
          h += '<p style="color:var(--text3);text-align:center;padding:16px">Belum ada catatan</p>';
        } else {
          notes.forEach(n => {
            h += `<div style="padding:8px;background:var(--surface2);border-radius:6px;margin-bottom:4px;border-left:3px solid ${n.is_pinned?'var(--amber)':'var(--accent)'}">
              <div style="display:flex;justify-content:space-between"><span style="color:var(--text);font-size:12px">${this.esc(n.title)}</span>
              <span style="font-size:9px;color:var(--text3)">${(n.tags||[]).map(t=>'#'+t).join(' ')}</span></div>
              <div style="color:var(--text3);font-size:11px;margin-top:3px">${this.esc((n.content||'').slice(0,120))}</div></div>`;
          });
        }
        h += '<div style="text-align:center;margin-top:10px;font-size:10px;color:var(--text3)">simpan catatan: judul\\nisi · cari catatan keyword</div>';
        document.getElementById('knowledgeBody').innerHTML = h;
      } catch(e) {}
    },

    // ── Reminders ──
    async checkReminders() {
      try {
        const res = await this.api('GET', `/api/v1/reminders/${this.userId}`);
        const reminders = await res.json();
        if (reminders.length === 0) return;
        document.getElementById('welcomeBody').innerHTML = `<p style="margin-bottom:10px;color:var(--text2)">📌 ${reminders.length} pengingat hari ini:</p>
          ${reminders.map(r => `<div style="padding:8px;background:var(--surface2);border-radius:6px;margin-bottom:6px;border-left:3px solid var(--amber)">
            <div style="color:var(--text);font-size:13px">${this.esc(r.message)}</div>
            <div style="color:var(--text3);font-size:10px;margin-top:3px">${this.fmtTime(r.remind_at)}</div></div>`).join('')}
          <button class="btn" style="margin-top:10px;width:100%" @click="modal=null">Tutup</button>`;
        this.modal = 'welcome';
      } catch(e) {}
    },

    async loadProfile() {
      try {
        const res = await this.api('GET', `/api/v1/users/${this.userId}`);
        const data = await res.json();
        if (data && data.profile && data.profile.name) this.displayName = data.profile.name;
      } catch(e) {}
    },

    // ── Format helpers ──
    esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); },
    fmtTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleTimeString('id', { hour: '2-digit', minute: '2-digit' });
    },
    fmtContent(t) {
      t = t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
      t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
      t = t.replace(/###?\s(.+)/gm, '<b>$1</b>');
      t = t.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
      t = t.replace(/\*(.+?)\*/g, '<i>$1</i>');
      t = t.replace(/\n/g, '<br>');
      return t;
    },
    scroll() {
      const area = document.getElementById('chatArea');
      area.scrollTop = area.scrollHeight;
    },
  }));
});
</script>
</body>
</html>
