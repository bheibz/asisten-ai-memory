version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:pass@postgres:5432/aichat
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - NINE_ROUTER_BASE_URL=${NINE_ROUTER_BASE_URL}
      - NINE_ROUTER_API_KEY=${NINE_ROUTER_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    env_file:
      - .env

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aichat
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d aichat"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  worker:
    build: .
    command: python -m app.workers.memory_worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:pass@postgres:5432/aichat
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - NINE_ROUTER_BASE_URL=${NINE_ROUTER_BASE_URL}
      - NINE_ROUTER_API_KEY=${NINE_ROUTER_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env

volumes:
  pgdata:
  qdrant_data:
